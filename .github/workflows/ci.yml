name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: salary_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d salary_management_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/salary_management_test?schema=public
      JWT_SECRET: ci-jwt-secret-change-before-production
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json
            apps/web/package-lock.json

      - name: Install root dependencies
        run: npm ci --include=dev

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci --include=dev

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci --include=dev

      - name: Install Rollup native dependency for API
        working-directory: apps/api
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@4.62.2

      - name: Install Rollup native dependency for web
        working-directory: apps/web
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@4.62.2

      - name: Verify root tooling
        run: npm exec prettier -- --version

      - name: Check formatting
        run: npm run format:check

      - name: Install lint tooling
        run: npm install --no-save eslint@8.57.1 @typescript-eslint/parser@7.18.0 @typescript-eslint/eslint-plugin@7.18.0

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Prepare test database
        working-directory: apps/api
        run: |
          npx prisma db push --schema prisma/schema.prisma
          npm run prisma:seed:test

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
